version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
      include: scope
    labels:
      - dependencies
      - npm
    groups:
      crypto-primitives:
        patterns:
          - "@noble/*"
          - "@scure/*"
          - "hash-wasm"
        update-types:
          - patch
          - minor
      dev-tooling:
        patterns:
          - "typescript"
          - "vitest"
          - "@types/*"
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: scope
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        patterns:
          - "*"
