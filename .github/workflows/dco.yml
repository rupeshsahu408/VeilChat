name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: dco-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dco:
    name: Verify Developer Certificate of Origin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify every commit in this PR is signed off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          echo "Checking DCO sign-offs for PR #${PR_NUMBER}"
          echo "  base: ${BASE_SHA}"
          echo "  head: ${HEAD_SHA}"
          echo

          # Make sure we have both ends of the range locally.
          git fetch --no-tags --depth=200 origin "${BASE_SHA}" "${HEAD_SHA}" 2>/dev/null || true

          # List every commit unique to the PR head.
          mapfile -t COMMITS < <(git rev-list --no-merges "${BASE_SHA}..${HEAD_SHA}")

          if [[ ${#COMMITS[@]} -eq 0 ]]; then
            echo "No non-merge commits in PR. Nothing to check."
            exit 0
          fi

          FAILED=0
          for SHA in "${COMMITS[@]}"; do
            SUBJECT=$(git log -1 --format='%s' "$SHA")
            AUTHOR_NAME=$(git log -1 --format='%an' "$SHA")
            AUTHOR_EMAIL=$(git log -1 --format='%ae' "$SHA")
            BODY=$(git log -1 --format='%B' "$SHA")

            EXPECTED="Signed-off-by: ${AUTHOR_NAME} <${AUTHOR_EMAIL}>"

            if grep -qiF "$EXPECTED" <<<"$BODY"; then
              echo "  ✔ ${SHA:0:12}  ${SUBJECT}"
              continue
            fi

            # Allow a Signed-off-by from any contributor in the message
            # (e.g. cherry-picked or co-authored commits) but require at
            # least one well-formed trailer.
            if grep -Eiq '^Signed-off-by: [^<]+ <[^@>]+@[^@>]+\.[^@>]+>' <<<"$BODY"; then
              echo "  ✔ ${SHA:0:12}  ${SUBJECT}  (signed off by another contributor)"
              continue
            fi

            FAILED=1
            echo "  ✘ ${SHA:0:12}  ${SUBJECT}"
            echo "      author:   ${AUTHOR_NAME} <${AUTHOR_EMAIL}>"
            echo "      expected: ${EXPECTED}"
          done

          echo

          if [[ "$FAILED" -ne 0 ]]; then
            cat <<'EOF' >&2
          ::error::One or more commits in this PR are missing a valid
          ::error::Signed-off-by trailer (Developer Certificate of Origin).
          ::error::
          ::error::Fix the most recent commit:
          ::error::    git commit --amend --signoff
          ::error::
          ::error::Fix every commit on the branch:
          ::error::    git rebase --signoff origin/main
          ::error::
          ::error::Then force-push:
          ::error::    git push --force-with-lease
          ::error::
          ::error::Full policy: see CONTRIBUTING.md in this repository.
          EOF
            exit 1
          fi

          echo "All ${#COMMITS[@]} commit(s) carry a valid Signed-off-by trailer."
