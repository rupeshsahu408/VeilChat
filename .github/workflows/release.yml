name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re-)publish, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @veil-protocol/crypto to npm
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@veil-protocol/crypto

    steps:
      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${INPUT_TAG}"
          else
            TAG="${REF_NAME}"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$TAG' does not match vMAJOR.MINOR.PATCH[-prerelease]." >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved release: tag=$TAG version=$VERSION"

      - name: Checkout (at the tag)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          persist-credentials: false
          fetch-depth: 0

      - name: Verify tag is signed
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          echo "Verifying signature on tag $TAG ..."
          if git verify-tag "$TAG"; then
            echo "Tag $TAG has a valid signature."
          else
            echo "::error::Tag $TAG is not signed (or signature could not be verified)." >&2
            echo "::error::Refusing to publish an unsigned release. Sign tags with: git tag -s $TAG -m '...'" >&2
            exit 1
          fi

      - name: Verify package.json version matches tag
        env:
          EXPECTED: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          ACTUAL=$(node -p "require('./packages/crypto/package.json').version")
          echo "package.json version: $ACTUAL"
          echo "tag-derived version:  $EXPECTED"
          if [[ "$ACTUAL" != "$EXPECTED" ]]; then
            echo "::error::Version mismatch: packages/crypto/package.json says '$ACTUAL' but tag implies '$EXPECTED'." >&2
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.26.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @veil-protocol/crypto typecheck

      - name: Test (RFC 5869 / RFC 4231 vectors must pass before publish)
        run: pnpm --filter @veil-protocol/crypto test

      - name: Build
        run: pnpm --filter @veil-protocol/crypto build

      - name: Publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          set -euo pipefail
          cd packages/crypto
          pnpm publish --access public --provenance --no-git-checks

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            `@veil-protocol/crypto@${{ steps.tag.outputs.version }}` published
            to npm with cryptographic provenance attestation.

            **Verify the published package:**

            ```bash
            npm install @veil-protocol/crypto@${{ steps.tag.outputs.version }}
            npm audit signatures
            ```

            The provenance attestation links the published tarball back to
            this exact tag, this commit (`${{ github.sha }}`), and this
            workflow run.
